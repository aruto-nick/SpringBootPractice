<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
	
	<head>
		<meta charset="UTF-8">
		<title>お問い合わせ編集画面</title>
	</head>
	
	<body>
		<h1>お問い合わせ編集画面</h1>
		
		<!--入力データをjava（サーバー側）に送信する役割-->
		<form th:action="@{/admin/contacts/{id}/update (id = ${contact.id})}"
			  th:object="${contact}" method="post">
			  
			  <!-- 【重要】既存のデータを消さずに保持するための隠しフィールド群 -->
			  <input type="hidden" th:field="*{id}" />
			  <input type="hidden" th:field="*{phone}" />
			  <input type="hidden" th:field="*{zipCode}" />
			  <input type="hidden" th:field="*{address}" />
			  <input type="hidden" th:field="*{buildingName}" />
			  <input type="hidden" th:field="*{contactType}" />
			  <input type="hidden" th:field="*{body}" />
			  <!-- もし作成日時・更新日時カラムがあれば、それらも追加します -->
			  <input type="hidden" th:field="*{createdAt}" />
			  <input type="hidden" th:field="*{updatedAt}" />
			  
			  <table border="1">
				  <tr>
					  <th>姓</th>
					  <td><input type="text" th:field="*{lastName}" /></td>
				  </tr>
				  <tr>
					  <th>名</th>
					  <td><input type="text" th:field="*{firstName}" /></td>
				  </tr>
				  <tr>
					  <th>メールアドレス</th>
				  	  <td><input type="text" th:field="*{email}" /></td>
				  </tr>
				  
				  
			  </table>
			  
			  <!--更新実行ボタン-->
			  <button type="submit">
				  更新
			  </button>
		
		
		</form>
	
	</body>
	
</html>
