<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
	<title>お問い合わせの一覧画面</title>
</head>

<body>
	<h1>お問い合わせの一覧画面</h1>
	
	<table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>姓</th>
                <th>名</th>
                <th>お問い合わせ種別</th>
                <th>登録日時</th>
                <th>更新日時</th>
            </tr>
        </thead>
        <tbody>
            
            <tr th:each="contact : ${contacts}">
                
                <!--12個カラムから必要な６カラムのみ選択 -->
                <td>
				    <a th:href="@{/admin/contacts/:{id}(id=${contact.id})}" th:text="${contact.id}"></a>
				</td>
                <td th:text="${contact.lastName}"></td>
                <td th:text="${contact.firstName}"></td>
                <td th:text="${contact.contactType}"></td>
                <td th:text="${contact.createdAt}"></td>
                <td th:text="${contact.updatedAt}"></td>
                
                <!-- 編集機能(12-11) -->
                <td>
					<a th:href="@{/admin/contacts/:{id}/edit(id=${contact.id})}">編集</a>
				</td>
                
                <!--　削除機能(12-11) -->
                <td>
					<form th:action="@{/admin/contacts/{id}/delete(id = ${contact.id})}" th:method="delete">
						<button type="submit" onclick="return confirm('本当に削除しますか？');">削除</button>
					</form>
				</td>
            </tr>
        </tbody>
    </table>
    
	 <!-- ログアウトボタン -->
	<form th:action="@{/admin/logout}" method="post" style="display: inline;">
	    <button type="submit">ログアウト</button>
	</form>


</body>

</html>
