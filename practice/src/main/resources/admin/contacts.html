<!DOCTYPE html>
<html>
	
<head>
	<meta charset="UTF-8">
	<title>お問い合わせの一覧画面</title>
</head>

<body>
	<h1>お問い合わせの一覧画面</h1>
	
	<table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>姓</th>
                <th>名</th>
                <th>お問い合わせ種別</th>
                <th>登録日時</th>
                <th>更新日時</th>
            </tr>
        </thead>
        <tbody>
            
            <tr th:each="contact : ${contacts}">
                
                <!--12個カラムから必要な６カラムのみ選択 -->
                <td th:text="${contact.id}"></td>
                <td th:text="${contact.lastName}"></td>
                <td th:text="${contact.firstName}"></td>
                <td th:text="${contact.contactType}"></td>
                <td th:text="${contact.createdAt}"></td>
                <td th:text="${contact.updatedAt}"></td>
                
            </tr>
        </tbody>
    </table>


</body>

</html>
